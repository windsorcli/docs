StylesPath = styles

MinAlertLevel = warning

# Microsoft Writing Style Guide is the base. The vale-action workflow
# installs styles listed in `Packages` automatically.
Packages = Microsoft

# Pre-approve Windsor-specific names so the dictionary doesn't bark at
# "Kustomize", "Talos", "Colima", etc.
Vocab = Windsor

[*.md]
BasedOnStyles = Microsoft, Windsor

# Skip patterns that aren't prose:
#  - YAML frontmatter (between the first pair of --- lines)
#  - URLs in markdown link targets and bare URLs
#  - inline code spans (`...`) — covered by default but listed for clarity
TokenIgnores = (?sm)^---$.+?^---$, \]\((https?://[^)]+)\), https?://\S+

# --- Default Vale rules we don't want ---
#
# Vale.Spelling fights our cspell dictionary. cspell has Windsor.dic and a
# richer ignore-regex list for code/URLs; let it own spelling.
Vale.Spelling = NO

# Vale.Terms auto-swaps "windsorcli"→"WindsorCLI" and "mermaid"→"Mermaid",
# conflicting with our Windsor.Spelling rule. Our rule is the source of truth.
Vale.Terms = NO

# --- Microsoft rules we override ---
#
# Style preferences (spacing, quote placement) Windsor docs don't enforce.
Microsoft.Dashes = NO
Microsoft.Quotes = NO

# "Prefer 'personal digital assistant' over 'agent'" — not in 2026.
Microsoft.Terms = NO

# "AWS", "CLI", "OCI" appear in headings all the time.
Microsoft.HeadingAcronyms = NO
Microsoft.Acronyms = NO

# "auto-swap", "auto-fix" — fine.
Microsoft.Auto = NO

# A-Z word list ("above", "sample", "back") — too pedantic for dev docs.
Microsoft.Vocab = NO

# We sometimes use semicolons. Sue us.
Microsoft.Semicolon = NO

# Contractions stay.
Microsoft.Contractions = NO

# These read as judgment calls rather than rules.
Microsoft.Adverbs = suggestion
Microsoft.Passive = suggestion
Microsoft.FirstPerson = suggestion
Microsoft.We = suggestion
Microsoft.Headings = suggestion
