name: Docs Quality

on:
  pull_request:
    paths:
      - '**.md'
      - '.markdownlint.jsonc'
      - '.vale.ini'
      - 'styles/**'
      - 'cspell.json'
      - 'Windsor.dic'
      - 'lychee.toml'
      - '.lycheeignore'
      - '.github/workflows/docs-quality.yml'

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2@0.14.0

      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md" "#node_modules"

  vale:
    name: Vale (prose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: errata-ai/vale-action@85f9f7f2c5f449ac0ae5b66662961bae3f77ca6a # reviewdog
        with:
          version: 3.7.1
          fail_on_error: true
          filter_mode: nofilter
          reporter: github-check
          token: ${{ secrets.GITHUB_TOKEN }}

  cspell:
    name: cspell (spelling)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install cspell
        run: npm install -g cspell@8.14.4

      - name: Run cspell
        run: cspell --no-progress "**/*.md"

  lychee:
    name: lychee (link check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - uses: lycheeverse/lychee-action@2b973e86fc7b1f6b36a93795fe2c9c6ae1118621 # v1.10.0
        with:
          args: --config lychee.toml --no-progress '**/*.md'
          fail: true

  alex:
    name: alex (inclusive language)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install alex
        run: npm install -g alex@11.0.1

      - name: Run alex
        run: alex --quiet '**/*.md'

  frontmatter:
    name: frontmatter (title + description required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check every page has title and description
        run: ./scripts/check-frontmatter.sh
