# lychee config — link checker for the docs repo.
#
# This repo's markdown is vendored into the windsorcli.github.io build and
# published at www.windsorcli.dev. Site-internal links — whether written as
# root-relative (`/workstation/...`) or as absolute prod URLs
# (`https://www.windsorcli.dev/reference/cli/...`, which vendor-docs localizes
# to root-relative) — only resolve on the built site, not from this repo in
# isolation, and only once this content is released. We skip them here and let
# the website's own build catch broken targets.
#
# `--base-url` is required so lychee treats `/foo` as a URL path rather
# than a filesystem path before the `exclude` regex runs. The value is a
# placeholder — nothing actually fetches it.

cache = true
max_cache_age = "1d"

base_url = "https://windsorcli.github.io"

# One-off URL exclusions live in .lycheeignore (auto-detected by lychee
# in the current directory; no config entry needed).

# Skip site-relative paths (resolved by the Astro site, not this repo)
# and common false-positive patterns.
exclude = [
  '^https?://(www\.)?windsorcli\.dev/',  # published site — resolved post-vendor, not from this repo
  '^https://windsorcli\.github\.io/',    # the site's build repo
  '^https?://localhost',
  '^https?://127\.',
  '^https?://example\.(com|invalid)',
  '^https?://.*\.test(/|$)',           # windsor-local *.test hostnames
]

# Treat these status codes as success — common bot-deflection responses
# from sites that the link is still real.
accept = [200, 206, 429]

# A short retry survives transient flakes without slowing the suite.
max_retries = 2
retry_wait_time = 2

# A small concurrency cap is friendlier to rate-limited hosts.
max_concurrency = 16

# User agent — some sites 403 on the default.
user_agent = "lychee/windsorcli-docs"

# Don't try to verify mailto: links.
include_mail = false
